worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Resolver for dynamic upstreams (Docker DNS)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Map subdomain to upstream port
    # The API server writes port mappings to /etc/nginx/conf.d/streams.conf
    # which gets included below. Each user stream gets a subdomain.
    map $host $stream_port {
        default 0;
        include /etc/nginx/conf.d/stream_ports.map;
    }

    # Default server - API and dashboard
    server {
        listen 80 default_server;
        server_name tonesintime.io www.tonesintime.io;

        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Wildcard subdomain server for streams
    server {
        listen 80;
        server_name ~^(?<subdomain>.+)\.tonesintime\.com$;

        # Icecast stream proxy
        location / {
            # If no mapping found, return 404
            if ($stream_port = 0) {
                return 404;
            }

            proxy_pass http://host.docker.internal:$stream_port;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Streaming-specific settings
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Allow long-lived connections for audio streams
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
